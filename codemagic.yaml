workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - app_store_credentials # 在 Codemagic UI 中配置: APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_PRIVATE_KEY (API Key 内容)
        - ios_signing # 在 Codemagic UI 中配置: CERTIFICATE_PRIVATE_KEY (P12文件), CERTIFICATE_PASSWORD (P12密码), PROVISIONING_PROFILE (Profile文件)
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.bd1bmc.cloudset" # [重要] 请修改为您在 Apple Developer 创建的真实 Bundle ID
        APP_STORE_ID: "6760583204" # [重要] 请修改为您在 App Store Connect 创建 App 后生成的 Apple ID (纯数字)
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'release/*'
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps
          npm run build
          # Force create ios directory structure if missing
          if [ ! -f "ios/App/Podfile" ]; then
            echo "Podfile not found, recreating ios platform..."
            rm -rf ios
            npx cap add ios
          fi
          npx cap sync ios
          
      - name: Debug and Install CocoaPods
        script: |
          echo "Current directory: $(pwd)"
          ls -R ios
          cd ios/App
          pod install --repo-update
          
      - name: Initialize Keychain
        script: |
          keychain initialize
          
      - name: Decode and import certificates
        script: |
          echo $CERTIFICATE_PRIVATE_KEY | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CERTIFICATE_PASSWORD
          
      - name: Decode and setup Provisioning Profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo $PROVISIONING_PROFILE | base64 --decode > "$PROFILES_HOME/profile.mobileprovision"
          
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
            
    artifacts:
      - "build/ios/ipa/*.ipa"
      - "/tmp/xcodebuild_logs/*.log"
      - "*.dSYM.zip"
      
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
